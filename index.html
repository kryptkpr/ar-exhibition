<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Michael Haggerty — AR Experience</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --ink: #f4f1ea;
      --bg: #0a0a0a;
      --accent: #d4af37;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ==================================================================
       CHROME CAMERA FIX
       MindAR injects a <video> element for the live camera feed.
       In some Chrome versions it gets visibility:hidden or wrong z-index.
       These rules force it visible and behind the AR canvas.
       ================================================================== */
    video {
      visibility: visible !important;
    }

    .mindar-ui-overlay {
      display: none !important;
    }

    /* The live camera <video> MindAR creates — make sure it's visible & full-size */
    body > video,
    a-scene + video,
    video[autoplay] {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 1 !important;
      visibility: visible !important;
      display: block !important;
    }

    /* A-Frame canvas sits on top of the camera video, transparent */
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 2 !important;
    }

    a-scene .a-canvas, a-scene canvas {
      background: transparent !important;
    }

    /* Welcome overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(212, 175, 55, 0.08), transparent 60%),
        linear-gradient(180deg, #0a0a0a 0%, #1a1410 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    #start-overlay.hidden { opacity: 0; pointer-events: none; }

    .signature {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3rem;
      opacity: 0.85;
    }

    .title {
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 400;
      font-style: italic;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      max-width: 20ch;
    }

    .subtitle {
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 32ch;
      opacity: 0.75;
      margin-bottom: 3rem;
    }

    .start-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--ink);
      padding: 1rem 2.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .start-btn:hover, .start-btn:active {
      background: var(--accent);
      color: var(--bg);
    }

    .instructions {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      text-align: center;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .instructions.hidden { opacity: 0; }

    .scan-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 280px);
      aspect-ratio: 1;
      border: 1px solid rgba(244, 241, 234, 0.3);
      pointer-events: none;
      z-index: 40;
      transition: opacity 0.4s ease;
    }

    .scan-hint::before, .scan-hint::after,
    .scan-hint > span::before, .scan-hint > span::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent);
    }
    .scan-hint::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .scan-hint::after { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .scan-hint > span::before { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .scan-hint > span::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

    .scan-hint.hidden { opacity: 0; }

    /* ==================================================================
       DIAGNOSTIC LOG — visible on-screen so we can debug from your phone
       ================================================================== */
    #debug {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      max-height: 40vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 0.5rem;
      z-index: 200;
      line-height: 1.4;
      border-bottom: 1px solid #0f0;
    }
    #debug .err { color: #f55; }
    #debug .ok { color: #0f0; }
    #debug .info { color: #ff0; }
    #debug-toggle {
      position: fixed;
      top: 0.5rem;
      right: 0.5rem;
      z-index: 201;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid #555;
      padding: 0.25rem 0.5rem;
      font-size: 11px;
      font-family: monospace;
      cursor: pointer;
    }
    #debug.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Diagnostic log -->
  <div id="debug"></div>
  <button id="debug-toggle">hide log</button>

  <div id="start-overlay">
    <div class="signature">Michael Haggerty</div>
    <h1 class="title">A still moment, made moving.</h1>
    <p class="subtitle">Point your phone at the painting after tapping below. Allow camera access when prompted. Tap the screen once playing to toggle sound.</p>
    <button class="start-btn" id="start-btn">Begin Experience</button>
  </div>

  <div class="scan-hint" id="scan-hint"><span></span></div>
  <div class="instructions" id="instructions">Aim camera at painting</div>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    background="transparent: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video
        id="art-video"
        src="film.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        id="ar-video-plane"
        src="#art-video"
        position="0 0 0"
        rotation="0 0 0"
        width="1"
        height="0.5625"
        opacity="1">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    // ===== Diagnostic logger =====
    const debugEl = document.getElementById('debug');
    const debugToggle = document.getElementById('debug-toggle');

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${time}] ${msg}`;
      debugEl.appendChild(line);
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log(`[AR-DEBUG] ${msg}`);
    }

    debugToggle.addEventListener('click', () => {
      debugEl.classList.toggle('hidden');
      debugToggle.textContent = debugEl.classList.contains('hidden') ? 'show log' : 'hide log';
    });

    // Catch any uncaught errors
    window.addEventListener('error', (e) => {
      log(`ERROR: ${e.message} @ ${e.filename}:${e.lineno}`, 'err');
    });

    log(`Page loaded. UA: ${navigator.userAgent.substring(0, 80)}...`, 'info');
    log(`HTTPS: ${location.protocol === 'https:' ? 'YES' : 'NO (camera will fail!)'}`,
        location.protocol === 'https:' ? 'ok' : 'err');
    log(`mediaDevices supported: ${!!navigator.mediaDevices}`, navigator.mediaDevices ? 'ok' : 'err');

    // ===== AR setup =====
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const scanHint = document.getElementById('scan-hint');
    const instructions = document.getElementById('instructions');
    const video = document.getElementById('art-video');
    const videoPlane = document.getElementById('ar-video-plane');
    const scene = document.querySelector('a-scene');
    const target = document.getElementById('target');

    let started = false;

    video.addEventListener('loadedmetadata', () => {
      const aspect = video.videoHeight / video.videoWidth;
      videoPlane.setAttribute('height', aspect);
      log(`Film video metadata loaded: ${video.videoWidth}x${video.videoHeight}`, 'ok');
    });

    video.addEventListener('error', (e) => {
      log(`Film video error: ${video.error ? video.error.message : 'unknown'}`, 'err');
    });

    target.addEventListener('targetFound', () => {
      log('Target FOUND — playing film', 'ok');
      scanHint.classList.add('hidden');
      instructions.classList.add('hidden');
      video.play().catch(err => log(`Film play error: ${err.message}`, 'err'));
    });

    target.addEventListener('targetLost', () => {
      log('Target lost — pausing film', 'info');
      scanHint.classList.remove('hidden');
      instructions.classList.remove('hidden');
      video.pause();
    });

    scene.addEventListener('renderstart', () => {
      log('A-Frame render started', 'ok');
    });

    startBtn.addEventListener('click', async () => {
      if (started) return;
      started = true;
      log('Begin button tapped', 'info');

      try {
        video.muted = true;
        await video.play();
        video.pause();
        video.currentTime = 0;
        log('Film video primed successfully', 'ok');
      } catch (err) {
        log(`Film prime error: ${err.message}`, 'err');
      }

      startOverlay.classList.add('hidden');

      const mindarSystem = scene.systems['mindar-image-system'];
      if (!mindarSystem) {
        log('MindAR system NOT FOUND on scene!', 'err');
        return;
      }
      log('MindAR system found, calling start()...', 'info');

      try {
        await mindarSystem.start();
        log('MindAR start() resolved', 'ok');

        // Inspect what camera video element MindAR created
        setTimeout(() => {
          const videos = document.querySelectorAll('video');
          log(`Total <video> elements on page: ${videos.length}`, 'info');
          videos.forEach((v, i) => {
            const isFilm = v.id === 'art-video';
            const label = isFilm ? 'FILM' : 'CAMERA?';
            const visible = window.getComputedStyle(v).visibility;
            const display = window.getComputedStyle(v).display;
            const zIndex = window.getComputedStyle(v).zIndex;
            const w = v.videoWidth;
            const h = v.videoHeight;
            const playing = !v.paused;
            log(`  video[${i}] (${label}): ${w}x${h} vis=${visible} disp=${display} z=${zIndex} playing=${playing}`,
                (w > 0 || isFilm) ? 'ok' : 'err');
            if (!isFilm && v.srcObject) {
              log(`  video[${i}] has srcObject (live stream): YES`, 'ok');
              // Force visibility one more time
              v.style.visibility = 'visible';
              v.style.display = 'block';
              v.style.zIndex = '1';
            } else if (!isFilm) {
              log(`  video[${i}] has srcObject: NO`, 'err');
            }
          });
        }, 1500);

      } catch (err) {
        log(`MindAR start error: ${err.message}`, 'err');
        alert('Camera access is required. Please enable it in your browser settings and reload.');
      }
    });

    document.addEventListener('click', (e) => {
      if (!started) return;
      if (e.target.closest('#start-overlay')) return;
      if (e.target.closest('#debug')) return;
      if (e.target.closest('#debug-toggle')) return;
      video.muted = !video.muted;
      log(`Audio ${video.muted ? 'muted' : 'unmuted'}`, 'info');
    });
  </script>
</body>
</html>
